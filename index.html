<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stemplay — 밴드 음원 분리 플레이어</title>
<link rel="icon" type="image/jpg" href="/images/xd.jpg">
<style>
  body {
    font-family: sans-serif;
    max-width: 640px;
    margin: 0 auto;
    padding: 24px;
    background: #121212;
    color: #eee;
  }
  h1 { font-size: 1.4rem; }
  h2 { font-size: 1.05rem; color: #ccc; margin: 24px 0 8px; }
  button {
    font-size: 16px;
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    white-space: nowrap;   /* 버튼 텍스트가 줄바꿈되며 깨지지 않도록 */
    flex-shrink: 0;        /* flex 컨테이너 안에서 버튼이 찌그러지지 않도록 */
  }
  button:disabled { background: #444; cursor: not-allowed; }
  #status { margin: 12px 0; color: #aaa; min-height: 1.2em; }
  #workerBanner {
    display: none;
    margin: 12px 0;
    padding: 10px 14px;
    border-radius: 8px;
    background: #3a2a12;
    color: #fbbf24;
  }
  .song-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0;
    background: #1e1e1e;
    padding: 12px 16px;
    border-radius: 8px;
  }
  .song-row.playable { cursor: pointer; }
  .song-row.playable:hover { background: #2a2a2a; }
  .song-row .title { flex: 1; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-row .sub { color: #888; font-size: 0.85rem; flex-shrink: 0; }
  .song-row .error { color: #f87171; font-size: 0.85rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-row button { font-size: 14px; padding: 5px 12px; }
  #emptyList { color: #666; padding: 16px 0; }
  .mixer-track {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 14px 0;
    background: #1e1e1e;
    padding: 12px 16px;
    border-radius: 8px;
  }
  .mixer-track label { width: 90px; font-weight: bold; }
  .mixer-track input[type="range"] { flex: 1; }
  #transport {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  #seek { flex: 1; }
  #time { font-variant-numeric: tabular-nums; color: #aaa; }
  #mixerHeader { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  #mixerHeader button { background: #333; }
  #songTitle { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── 모바일: 메뉴 이름을 생략하고 이모지(기호)만 표시 ── */
  @media (max-width: 480px) {
    body { padding: 12px; }
    .btn-text { display: none; }
    button { padding: 8px 14px; }
    .song-row { gap: 8px; padding: 10px 12px; }
    .mixer-track { gap: 10px; padding: 10px 12px; }
    .mixer-track label { width: auto; min-width: 1.6em; text-align: center; }
    #mixerHeader, #transport { gap: 8px; }
  }
</style>
</head>
<body>

<h1>🎸 stemplay <span class="btn-text" style="font-size:0.85rem; font-weight:normal; color:#aaa;">밴드 음원 분리 플레이어</span></h1>

<div id="status"></div>

<!-- ══════════ 메인 화면: 링크 입력 + 곡 리스트 ══════════ -->
<div id="homeView">
  <p style="display:flex; gap:8px;">
    <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..."
           style="flex:1; font-size:16px; padding:8px 12px; border-radius:6px; border:1px solid #444; background:#1e1e1e; color:#eee;">
    <button id="uploadBtn" onclick="submitUrl()">➕<span class="btn-text"> 곡 추가</span></button>
  </p>

  <div id="workerBanner">⚠️ 분리 PC(워커)가 꺼져 있습니다 — 새 곡 분리는 PC를 켠 뒤 시작됩니다. 이미 분리된 곡은 재생 가능합니다.</div>

  <h2>곡 리스트</h2>
  <div id="songList"></div>

  <p style="margin-top:24px; text-align:right;">
    <button id="clearBtn" onclick="clearAll()" style="background:#dc2626; font-size:14px; padding:5px 12px;">🗑️<span class="btn-text"> 전체 삭제</span></button>
  </p>
</div>

<!-- ══════════ 믹서 화면: 선택한 곡 재생 + 악기별 볼륨 ══════════ -->
<div id="mixerView" style="display:none;">
  <div id="mixerHeader">
    <button onclick="goHome()">←<span class="btn-text"> 곡 리스트</span></button>
    <span id="songTitle"></span>
  </div>
  <div id="transport">
    <button id="playBtn" onclick="togglePlay()">▶<span class="btn-text"> 재생</span></button>
    <input type="range" id="seek" min="0" max="0" step="0.1" value="0"
           oninput="seekTo(parseFloat(this.value))">
    <span id="time">0:00 / 0:00</span>
  </div>
  <div id="tracks"></div>
</div>

<script>
// 서버가 감지할 수 있는 전체 악기 목록 (htdemucs_6s 6-stem)
// 모바일에서는 icon만, 그 외에는 icon + name으로 표시
const TRACK_LABELS = {
  vocals: { icon: '🎤', name: '보컬' },
  drums:  { icon: '🥁', name: '드럼' },
  bass:   { icon: '🎸', name: '베이스' },
  guitar: { icon: '🎸', name: '기타' },
  piano:  { icon: '🎹', name: '피아노' },
  other:  { icon: '🎶', name: '그 외' },
};
const JOB_STATUS_LABELS = {
  queued:     { icon: '⏳', name: '대기 중' },
  processing: { icon: '🎛️', name: '분리 중...' },
  failed:     { icon: '❌', name: '실패' },
};

// icon + <span class="btn-text">name</span> 형태의 HTML 생성 (모바일에서 name 숨김)
function iconLabel(icon, name) {
  return `${icon}<span class="btn-text"> ${name}</span>`;
}
const POLL_MS = 5000;   // 곡 리스트 갱신 간격

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let trackIds = [];    // 현재 곡에서 감지된 악기 id 목록 (서버 응답으로 결정)
let buffers = {};     // track id → AudioBuffer
let gains = {};       // track id → GainNode
let sources = {};     // track id → AudioBufferSourceNode (재생할 때마다 새로 생성)
let duration = 0;
let pausedAt = 0;     // 일시정지된 재생 위치(초)
let startedAt = 0;    // 재생 시작 시점의 audioCtx.currentTime
let isPlaying = false;

// ── 화면 전환 ────────────────────────────────────────────────
function showView(name) {
  document.getElementById('homeView').style.display = name === 'home' ? 'block' : 'none';
  document.getElementById('mixerView').style.display = name === 'mixer' ? 'block' : 'none';
}

function goHome() {
  // 믹서를 떠나면 재생을 멈추고 리소스를 정리한다
  stopSources();
  Object.values(gains).forEach(g => g.disconnect());
  trackIds = [];
  buffers = {};
  gains = {};
  duration = 0;
  pausedAt = 0;
  isPlaying = false;
  document.getElementById('status').innerText = '';
  showView('home');
  refreshSongs();
}

// ── 곡 리스트 (주기적으로 서버와 동기화) ─────────────────────
async function refreshSongs() {
  let data;
  try {
    const res = await fetch('/songs');
    if (res.status === 401) { location.href = '/login'; return; }  // 세션 만료 → 재로그인
    data = await res.json();
  } catch (e) {
    return;   // 서버 접속 실패 → 다음 폴링에서 재시도
  }
  document.getElementById('workerBanner').style.display =
    data.worker_online ? 'none' : 'block';

  const list = document.getElementById('songList');
  list.innerHTML = '';

  // 진행 중/실패한 작업을 리스트 맨 위에 표시
  data.jobs.forEach(job => {
    const row = document.createElement('div');
    row.className = 'song-row';

    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = job.song_name;
    row.appendChild(title);

    const sub = document.createElement('span');
    sub.className = 'sub';
    const st = JOB_STATUS_LABELS[job.status];
    if (st) sub.innerHTML = iconLabel(st.icon, st.name);
    else sub.textContent = job.status;
    row.appendChild(sub);

    if (job.status === 'failed') {
      if (job.error) {
        const err = document.createElement('span');
        err.className = 'error';
        err.textContent = job.error;
        err.title = job.error;   // 마우스를 올리면 전체 메시지 표시
        row.appendChild(err);
      }
      const retryBtn = document.createElement('button');
      retryBtn.innerHTML = iconLabel('🔄', '재시도');
      retryBtn.onclick = () => submitVideoId(job.song_name);
      row.appendChild(retryBtn);
    }
    list.appendChild(row);
  });

  // 들을 수 있는 곡 (클릭 → 믹서 화면)
  data.songs.forEach(song => {
    const row = document.createElement('div');
    row.className = 'song-row playable';
    row.onclick = () => openSong(song);

    const title = document.createElement('span');
    title.className = 'title';
    title.textContent = song.title;
    row.appendChild(title);

    const sub = document.createElement('span');
    sub.className = 'sub';
    sub.innerHTML = `<span class="btn-text">악기 </span>${song.tracks.length}<span class="btn-text">개</span> ▶`;
    row.appendChild(sub);

    list.appendChild(row);
  });

  if (!data.jobs.length && !data.songs.length) {
    list.innerHTML = '<div id="emptyList">아직 분리된 곡이 없습니다. 위에 유튜브 링크를 넣어 곡을 추가해보세요.</div>';
  }
}

// ── 새 곡 추가 (분리 요청) ───────────────────────────────────
async function submitUrl() {
  const url = document.getElementById('youtubeUrl').value.trim();
  if (!url) return alert('유튜브 링크를 입력해주세요.');
  await requestProcess(url);
}

function submitVideoId(videoId) {
  return requestProcess(`https://youtu.be/${videoId}`);
}

async function requestProcess(url) {
  const status = document.getElementById('status');
  const uploadBtn = document.getElementById('uploadBtn');
  uploadBtn.disabled = true;
  try {
    // 같은 서버에서 서빙되므로 상대 경로로 요청 (배포 시 수정 불필요)
    const response = await fetch('/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || '서버 오류');

    if (data.status === 'done') {
      // 이미 분리된 곡 → 바로 믹서로
      document.getElementById('youtubeUrl').value = '';
      await openSong(data);
      return;
    }
    // 큐에 등록됨 → 리스트에 '분리 중' 항목으로 나타난다
    document.getElementById('youtubeUrl').value = '';
    status.innerText = data.worker_online === false
      ? '큐에 등록했습니다. 분리 PC가 켜지면 분리가 시작됩니다.'
      : '큐에 등록했습니다. 분리가 끝나면 리스트에서 재생할 수 있습니다 (1~5분 소요).';
    refreshSongs();
  } catch (err) {
    status.innerText = '오류: ' + err.message;
  } finally {
    uploadBtn.disabled = false;
  }
}

// ── 곡 열기: 스템 로드 후 믹서 화면으로 전환 ─────────────────
async function openSong(song) {
  const status = document.getElementById('status');
  status.innerText = `오디오 데이터를 불러오는 중... — ${song.title}`;
  try {
    stopSources();
    buildMixer(song.tracks);

    // 감지된 트랙을 병렬로 다운로드 + 디코딩
    await Promise.all(song.tracks.map(async ({ id, file }) => {
      const res = await fetch(`/audio/${encodeURIComponent(song.song_name)}/${file}`);
      if (!res.ok) throw new Error(`${id} 트랙 로드 실패`);
      buffers[id] = await audioCtx.decodeAudioData(await res.arrayBuffer());
    }));

    duration = Math.max(...trackIds.map(id => buffers[id].duration));
    document.getElementById('seek').max = duration;
    pausedAt = 0;
    isPlaying = false;
    updateTransportUI();

    const detected = trackIds.map(id => TRACK_LABELS[id] ? TRACK_LABELS[id].name : id).join(', ');
    status.innerText = `감지된 악기: ${detected}`;
    document.getElementById('songTitle').textContent = song.title;
    showView('mixer');
  } catch (err) {
    status.innerText = '오류: ' + err.message;
  }
}

// ── 감지된 악기별 볼륨 슬라이더 UI 생성 (곡을 불러올 때마다 재구성) ──
function buildMixer(tracks) {
  const tracksDiv = document.getElementById('tracks');
  tracksDiv.innerHTML = '';
  Object.values(gains).forEach(g => g.disconnect());
  gains = {};
  buffers = {};
  trackIds = tracks.map(t => t.id);

  trackIds.forEach(id => {
    const row = document.createElement('div');
    row.className = 'mixer-track';
    const t = TRACK_LABELS[id] || { icon: '🎵', name: id };
    row.innerHTML = `
      <label>${iconLabel(t.icon, t.name)}</label>
      <input type="range" min="0" max="1" step="0.01" value="0.8"
             oninput="changeVolume('${id}', this.value)">`;
    tracksDiv.appendChild(row);

    const gain = audioCtx.createGain();
    gain.gain.value = 0.8;
    gain.connect(audioCtx.destination);
    gains[id] = gain;
  });
}

// ── 서버에 저장된 음원 전체 삭제 ─────────────────────────────
async function clearAll() {
  if (!confirm('서버에 저장된 모든 곡(분리 결과)을 삭제할까요?')) return;

  const status = document.getElementById('status');
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.disabled = true;

  try {
    const response = await fetch('/clear', { method: 'POST' });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || '서버 오류');
    status.innerText = '서버의 모든 곡을 삭제했습니다.';
    refreshSongs();
  } catch (err) {
    status.innerText = '오류: ' + err.message;
  } finally {
    clearBtn.disabled = false;
  }
}

// ── 재생 제어 (일시정지해도 재생 위치가 유지됨) ────────────────
function playFrom(offset) {
  trackIds.forEach(id => {
    const src = audioCtx.createBufferSource();
    src.buffer = buffers[id];
    src.connect(gains[id]);
    src.start(0, offset);          // 모든 트랙을 동일 시점에 시작 → 완벽 동기화
    sources[id] = src;
  });
  // 가장 긴 트랙이 자연스럽게 끝났을 때 처음으로 되감기
  const longest = trackIds.reduce((a, b) => buffers[a].duration >= buffers[b].duration ? a : b);
  sources[longest].onended = () => {
    isPlaying = false;
    pausedAt = 0;
    sources = {};
    updateTransportUI();
  };
  startedAt = audioCtx.currentTime;
  pausedAt = offset;
  isPlaying = true;
  updateTransportUI();
}

function stopSources() {
  Object.values(sources).forEach(src => {
    src.onended = null;            // 수동 정지는 '곡 종료'로 취급하지 않음
    try { src.stop(); } catch (e) { /* 이미 정지된 경우 무시 */ }
  });
  sources = {};
}

function getPosition() {
  const pos = isPlaying ? pausedAt + (audioCtx.currentTime - startedAt) : pausedAt;
  return Math.min(pos, duration);
}

function togglePlay() {
  if (!trackIds.length || !buffers[trackIds[0]]) return;
  if (isPlaying) {
    pausedAt = getPosition();
    stopSources();
    isPlaying = false;
    updateTransportUI();
  } else {
    audioCtx.resume();
    playFrom(pausedAt >= duration ? 0 : pausedAt);
  }
}

function seekTo(t) {
  if (!trackIds.length || !buffers[trackIds[0]]) return;
  if (isPlaying) {
    stopSources();
    playFrom(t);
  } else {
    pausedAt = t;
    updateTransportUI();
  }
}

function changeVolume(track, value) {
  gains[track].gain.value = value;
}

// ── 재생 위치 표시 ───────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateTransportUI() {
  const pos = getPosition();
  document.getElementById('seek').value = pos;
  document.getElementById('time').innerText =
    `${formatTime(pos)} / ${formatTime(duration)}`;
  document.getElementById('playBtn').innerHTML =
    isPlaying ? iconLabel('⏸', '일시정지') : iconLabel('▶', '재생');
}

setInterval(() => { if (isPlaying) updateTransportUI(); }, 200);

// ── 초기화: 리스트를 즉시 불러오고 주기적으로 갱신 ───────────
refreshSongs();
setInterval(refreshSongs, POLL_MS);
</script>

</body>
</html>
